# Alembic Configuration File

[alembic]
# path to migration scripts
script_location = alembic

# File naming template: sequential number + slug
# Set to "001" + description for first migration, "002" + description for second, etc
file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .
path_separator = os

# Database connection string (can be overridden by environment variable)
sqlalchemy.url = sqlite:///./backup.db

# Logging configuration
[loggers]
keys = root,sqlalchemy

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
